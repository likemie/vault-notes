  <circle cx="470" cy="410" r="285" fill="#e9e9e9" fill-opacity="0.88" stroke="#202124" stroke-width="4"/>
  <circle cx="730" cy="410" r="285" fill="#e9e9e9" fill-opacity="0.72" stroke="#202124" stroke-width="4"/>
  <path d="M600 156 A285 285 0 0 1 600 664 A285 285 0 0 1 600 156" fill="#dcdcdc" fill-opacity="0.55"/>

